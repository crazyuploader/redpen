# Redpen Configuration Sample
# Copy to config.yaml and fill in values (config.yaml is gitignored)

# GitHub PAT. Also settable via GITHUB_TOKEN env var.
token: "ghp_xxxxxxxxxxxx"

# Repository to fetch from (owner/repo)
repo: "owner/repo"

# Output directory
out: "./pr-reviews"

# Parallel PR fetches
parallelism: 4

# PR state: open, closed, all
state: "all"

# Log level: debug, info, warn, error
log-level: "info"

# PR author logins to fetch (comma-separated). Queries GitHub Search API per
# author — no full repo enumeration, far fewer API calls.
# pr-author: "user1,user2"

# Reviewer logins to keep comments from (comma-separated). Covers inline review
# comments, overall reviews, and discussion comments.
# comment-filter: "reviewer1,reviewer2"

# Reviewer types to keep (comma-separated, case-insensitive).
# GitHub values: user, bot, organization
# Set "user" to drop bot noise and keep only human reviewers.
# reviewer-type: "user"

# Drop PRs with zero matching comments after all filters run.
# Keeps output tight when comment-filter or reviewer-type is narrow.
# skip-empty: true

# Max PRs to process (0 = no limit)
# limit: 10

# Ignore cache, re-fetch all PRs from GitHub
# force: false
