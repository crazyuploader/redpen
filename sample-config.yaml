# Redpen Configuration Sample
# Copy to config.yaml and fill in your details (config.yaml is gitignored)

# GitHub PAT — can also be set via GITHUB_TOKEN env var
token: "ghp_xxxxxxxxxxxx"

# Repository to fetch from (owner/repo)
repo: "owner/repo"

# Default output directory
out: "./pr-reviews"

# Number of parallel PR fetches
parallelism: 4

# PR state to fetch (open, closed, all)
state: "all"

# Log level (debug, info, warn, error)
log-level: "info"

# Filter by PR author login (comma-separated). Uses GitHub Search API — no full
# repo enumeration. Much faster and cheaper on rate limit than fetching all PRs.
# pr-author: "user1,user2"

# Filter comments by reviewer login (comma-separated). Applied to inline review
# comments, overall reviews, and discussion comments.
# comment-filter: "reviewer1,reviewer2"

# Filter comments by author type (comma-separated, case-insensitive).
# GitHub values: user, bot, organization
# Useful for excluding bot noise or focusing only on human reviewers.
# reviewer-type: "user"

# Skip PRs that have zero matching comments after all filters are applied.
# Avoids cluttering output with PRs that had no relevant feedback.
# skip-empty: true

# Max PRs to process (0 = no limit)
# limit: 10

# Ignore cache and re-fetch everything from the API
# force: false
